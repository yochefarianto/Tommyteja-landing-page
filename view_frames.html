<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .frame { border: 2px solid #333; border-radius: 8px; overflow: hidden; position: relative; }
        .frame img { width: 100%; display: block; }
        .label { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Extracted Frames</h1>
    <div class="grid" id="grid"></div>
    <script>
        const grid = document.getElementById('grid');
        for (let i = 0; i < 80; i++) {
            const num = String(i).padStart(3, '0');
            const frame = document.createElement('div');
            frame.className = 'frame';
            frame.innerHTML = `<span class="label">Frame ${num}</span><img src="extracted_frames/frame_${num}.png">`;
            grid.appendChild(frame);
        }
    </script>
</body>
</html>
